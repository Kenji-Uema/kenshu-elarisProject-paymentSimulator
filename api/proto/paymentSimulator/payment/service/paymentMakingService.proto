syntax = "proto3";

package paymentSimulator.payment.v1;
option go_package = "github.com/Kenji-Uema/paymentSimulator/internal/app/payment;payment";

import "google/api/annotations.proto";
import "paymentSimulator/payment/payWithCard.proto";

service PaymentMakingService {
  rpc PayWithCard(PayWithCardRequest) returns (PayWithCardResponse) {
    option (google.api.http) = {
      post: "/v1/payments/invoice/{invoice_number}"
      body: "card"
    };
  }
}
