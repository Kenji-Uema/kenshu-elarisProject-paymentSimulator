version: v2
plugins:
  - local: protoc-gen-go
    out: .
    opt:
      - paths=import
      - module=github.com/Kenji-Uema/paymentSimulator
  - local: protoc-gen-go-grpc
    out: .
    opt:
      - paths=import
      - module=github.com/Kenji-Uema/paymentSimulator
      - MpaymentSimulator/payment/service/paymentMakingService.proto=github.com/Kenji-Uema/paymentSimulator/internal/transport/grpc/payment;payment
      - MpaymentSimulator/payment/service/paymentRequestReissueService.proto=github.com/Kenji-Uema/paymentSimulator/internal/transport/grpc/payment;payment
  - local: protoc-gen-grpc-gateway
    out: .
    opt:
      - paths=import
      - module=github.com/Kenji-Uema/paymentSimulator
      - MpaymentSimulator/payment/service/paymentMakingService.proto=github.com/Kenji-Uema/paymentSimulator/internal/transport/grpc/payment;payment
      - MpaymentSimulator/payment/service/paymentRequestReissueService.proto=github.com/Kenji-Uema/paymentSimulator/internal/transport/grpc/payment;payment
