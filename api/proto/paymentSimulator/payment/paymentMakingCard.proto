syntax = "proto3";

package paymentSimulator.payment.v1;
option go_package = "github.com/Kenji-Uema/paymentSimulator/internal/domain/dto;dto";

import "google/protobuf/timestamp.proto";
import "paymentSimulator/common/cardSummary.proto";

// request
message PayWithCardRequest {
  Card card = 1;
  string invoice_number = 2;
}

message Card {
  string brand = 1;
  string number = 2;
  uint32 exp_month = 3;
  uint32 exp_year = 4;
  string cvv = 5;
  string holder_name = 6;
}

// response
message PayWithCardResponse {
  string receipt_number = 1;
  string invoice_number = 2;

  PaymentStatus status = 3;
  paymentSimulator.common.CardSummary card = 4;
  google.protobuf.Timestamp processed_at = 5;
}

enum PaymentStatus {
  PAYMENT_STATUS_UNSPECIFIED = 0;
  PAYMENT_STATUS_PENDING = 1;
  PAYMENT_STATUS_SUCCEEDED = 2;
  PAYMENT_STATUS_FAILED = 3;
  PAYMENT_STATUS_EXPIRED = 4;
  PAYMENT_STATUS_CANCELLED = 5;
}
