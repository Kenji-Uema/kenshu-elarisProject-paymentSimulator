syntax = "proto3";

package clockEmulator;
option go_package = "github.com/Kenji-Uema/paymentSimulator/internal/transport/grpc/clock;clock";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

message NowResponse {
  google.protobuf.Timestamp time = 1;
}

service ClockService {
  rpc Now (google.protobuf.Empty) returns (NowResponse);
}
